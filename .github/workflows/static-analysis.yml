name: static analysis

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  phpstan:
    runs-on: ubuntu-latest
    name: PHPStan

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: json, mbstring
          coverage: none

      # Nova is a paid, private package. PHPStan resolves the Nova surface via
      # phpstan-stubs/nova.stub, so CI installs against a local Nova stub rather
      # than requiring credentials.
      - name: Use the Nova stub
        run: composer config repositories.nova path ./tests/stubs/nova

      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction --no-progress

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --no-progress --memory-limit=1G
