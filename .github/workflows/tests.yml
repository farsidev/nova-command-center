name: tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  tests:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          # Laravel 10 / 11 / 12 via the Testbench version. The library supports
          # PHP 8.1 at runtime, but the test toolchain (Pest 2 → paratest) needs
          # PHP 8.2+, so the suite runs from 8.2 upward.
          - php: '8.2'
            testbench: '^8.0'
            laravel: '10'
          - php: '8.3'
            testbench: '^9.0'
            laravel: '11'
          - php: '8.3'
            testbench: '^10.0'
            laravel: '12'

    name: PHP ${{ matrix.php }} · Laravel ${{ matrix.laravel }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: json, mbstring
          coverage: none

      # Nova is a paid, private package. The suite is Nova-independent, so CI
      # resolves laravel/nova to a local stub instead of requiring credentials.
      # Real Nova v4/v5 compatibility is validated manually against live panels.
      - name: Use the Nova stub
        run: composer config repositories.nova path ./tests/stubs/nova

      - name: Select Testbench version
        run: composer require "orchestra/testbench:${{ matrix.testbench }}" --dev --no-update

      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction --no-progress

      - name: Run tests
        run: vendor/bin/pest
