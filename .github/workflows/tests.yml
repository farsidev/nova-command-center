name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3']
        nova: ['^4.0', '^5.0']
        exclude:
          # Nova 5 pulls Laravel 11+, which requires PHP 8.2+.
          - php: '8.1'
            nova: '^5.0'

    name: PHP ${{ matrix.php }} · Nova ${{ matrix.nova }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: json, mbstring
          coverage: none

      - name: Configure Nova repository
        run: |
          composer config repositories.nova composer https://nova.laravel.com
          composer config http-basic.nova.laravel.com "${{ secrets.NOVA_USERNAME }}" "${{ secrets.NOVA_LICENSE_KEY }}"

      - name: Select Nova version
        run: composer require "laravel/nova:${{ matrix.nova }}" --no-update

      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction --no-progress

      - name: Run tests
        run: vendor/bin/pest
