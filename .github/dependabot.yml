version: 2
updates:
  # No composer ecosystem: laravel/nova is a private package, so Dependabot
  # cannot resolve the dependency graph at all — every composer update job
  # fails with "laravel/nova could not be found", even with the dependency
  # ignored. Composer deps are exercised by the CI test matrix (fresh
  # installs against Laravel 10/11/12 on every push) instead.

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    # laravel-mix 6 (the build system Nova tools must use) requires webpack
    # internals that newer webpack 5.x releases removed (e.g.
    # webpack/lib/SizeFormatHelpers, gone by 5.108) — bumps break `npm run
    # prod`. webpack tracks whatever laravel-mix supports, manually.
    ignore:
      - dependency-name: webpack

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
