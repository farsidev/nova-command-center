version: 2
updates:
  - package-ecosystem: composer
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    # laravel/nova is a private package resolved from a local stub in CI;
    # Dependabot cannot resolve it and must leave it alone.
    ignore:
      - dependency-name: laravel/nova

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
